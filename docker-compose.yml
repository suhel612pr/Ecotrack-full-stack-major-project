version: '3.8'

services:
  ecotrack-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecotrack_fullstack_app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=postgresql://postgres:ecotrack_secure_db_pass@db:5432/ecotrack_saas?schema=public
    depends_on:
      db:
        condition: service_healthy
    restart: always

  db:
    image: postgres:15-alpine
    container_name: ecotrack_postgres_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=ecotrack_secure_db_pass
      - POSTGRES_DB=ecotrack_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  postgres_data:
